<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cortia — NICE guideline quick-reference cards for GPs and GP trainees">
  <title>Cortia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-glow bg-glow--purple"></div>
    <div class="bg-glow bg-glow--blue"></div>
    <div class="bg-glow bg-glow--pink"></div>
    <div class="bg-glow bg-glow--teal"></div>
    <div class="bg-glow bg-glow--violet"></div>
    <div class="bg-noise"></div>
  </div>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <h1 class="brand-title">Cortia</h1>
      <p class="brand-subtitle">Guidelines at a Glance</p>
    </div>
  </header>

  <!-- ── Controls ── -->
  <div class="controls">
    <div class="controls-inner">
      <div class="search-wrap" role="search">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="search"
          id="search-input"
          placeholder="Search guidelines, conditions, drug names…"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Search guidelines"
        >
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <main>

    <!-- Search results (shown only when query active) -->
    <section id="search-results" hidden>
      <p class="results-count" id="results-count" aria-live="polite"></p>
      <div class="card-grid" id="search-grid" role="list"></div>
    </section>

    <!-- Free Guidelines / Favourites -->
    <section class="home-section" id="recently-added">
      <h2 class="section-heading" id="top-section-heading">Recently Added</h2>
      <div class="card-grid" id="recent-grid" role="list"></div>
    </section>

    <!-- Browse by System -->
    <section class="home-section" id="systems-section">
      <h2 class="section-heading">Browse by System <span class="section-count" id="guidelines-total"></span></h2>
      <div id="systems-list">
        <!-- Generated by app.js -->
      </div>
    </section>

  </main>

  <!-- ── Modal ── -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <div class="modal-box">

      <div class="modal-actions">
        <button class="modal-print-btn" id="modal-print" aria-label="Print guideline" title="Print / Save as PDF">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
        </button>
        <button class="modal-close" id="modal-close" aria-label="Close guideline">&#x2715;</button>
      </div>

      <!-- Modal header -->
      <div class="modal-header">
        <div class="modal-meta">
          <a class="modal-nice-badge" id="modal-ref" target="_blank" rel="noopener noreferrer"></a>
          <span class="modal-updated" id="modal-updated"></span>
          <span class="modal-system-chip" id="modal-system"></span>
        </div>
        <h2 id="modal-title"></h2>
        <div class="patient-links-list" id="patient-links-list"></div>
      </div>

      <!-- Tab bar -->
      <div class="modal-tabs" role="tablist">
        <button class="modal-tab modal-tab--consult" data-tab="summary" role="tab" aria-controls="tab-summary" id="modal-tab-summary">Consult</button>
        <button class="modal-tab" data-tab="diagnosis"  role="tab" aria-controls="tab-diagnosis">Diagnosis</button>
        <button class="modal-tab" data-tab="investigations" role="tab" aria-controls="tab-investigations" id="modal-tab-investigations">Investigations</button>
        <button class="modal-tab" data-tab="management" role="tab" aria-controls="tab-management">Management</button>
        <button class="modal-tab" data-tab="overview"      role="tab" aria-controls="tab-overview"      id="modal-tab-overview">Overview</button>
        <button class="modal-tab" data-tab="monitoring" role="tab" aria-controls="tab-monitoring">Monitoring</button>
        <button class="modal-tab" data-tab="referral"   role="tab" aria-controls="tab-referral">Referral</button>
        <button class="modal-tab" data-tab="air"        role="tab" aria-controls="tab-air"  id="modal-tab-air">AIR Therapy</button>
        <button class="modal-tab" data-tab="mart"       role="tab" aria-controls="tab-mart" id="modal-tab-mart">MART Therapy</button>
        <button class="modal-tab" data-tab="inhalers"   role="tab" aria-controls="tab-inhalers" id="modal-tab-inhalers">Inhaler Types</button>
        <button class="modal-tab" data-tab="insulins"   role="tab" aria-controls="tab-insulins" id="modal-tab-insulins">Insulin Types</button>
        <button class="modal-tab" data-tab="hrt"        role="tab" aria-controls="tab-hrt"      id="modal-tab-hrt">HRT Preparations</button>
        <button class="modal-tab" data-tab="drugs"      role="tab" aria-controls="tab-drugs"    id="modal-tab-drugs">Oral Hypoglycaemics</button>
        <button class="modal-tab" data-tab="gad2"       role="tab" aria-controls="tab-gad2"     id="modal-tab-gad2">GAD-2</button>
        <button class="modal-tab" data-tab="gad7"       role="tab" aria-controls="tab-gad7"     id="modal-tab-gad7">GAD-7</button>
        <button class="modal-tab" data-tab="aq10"       role="tab" aria-controls="tab-aq10"     id="modal-tab-aq10">AQ-10</button>
        <button class="modal-tab" data-tab="dmard"      role="tab" aria-controls="tab-dmard"    id="modal-tab-dmard">DMARD Monitoring</button>
        <button class="modal-tab" data-tab="gpcog"      role="tab" aria-controls="tab-gpcog"    id="modal-tab-gpcog">GPCOG</button>
        <button class="modal-tab" data-tab="sixcit"     role="tab" aria-controls="tab-sixcit"   id="modal-tab-sixcit">6CIT</button>
        <button class="modal-tab" data-tab="types"      role="tab" aria-controls="tab-types"    id="modal-tab-types">Types</button>
        <button class="modal-tab" data-tab="images"     role="tab" aria-controls="tab-images"   id="modal-tab-images">Images</button>
        <button class="modal-tab" data-tab="simonbroome" role="tab" aria-controls="tab-simonbroome" id="modal-tab-simonbroome">Simon Broome</button>
        <button class="modal-tab" data-tab="steroids"    role="tab" aria-controls="tab-steroids"    id="modal-tab-steroids">Topical Steroids</button>
        <button class="modal-tab" data-tab="ftu"                role="tab" aria-controls="tab-ftu"                id="modal-tab-ftu">Fingertip Units</button>
        <button class="modal-tab" data-tab="schedule"          role="tab" aria-controls="tab-schedule"          id="modal-tab-schedule">Schedule</button>
        <button class="modal-tab" data-tab="special-groups"    role="tab" aria-controls="tab-special-groups"    id="modal-tab-special-groups">Special Groups</button>
        <button class="modal-tab" data-tab="at-risk"           role="tab" aria-controls="tab-at-risk"           id="modal-tab-at-risk">At-Risk Conditions</button>
        <button class="modal-tab" data-tab="contraindications" role="tab" aria-controls="tab-contraindications" id="modal-tab-contraindications">Contraindications</button>
        <button class="modal-tab" data-tab="administration"    role="tab" aria-controls="tab-administration"    id="modal-tab-administration">Administration</button>
      </div>

      <!-- Tab content panels -->
      <div class="modal-content">
        <div class="tab-panel" id="tab-summary"        role="tabpanel"></div>
        <div class="tab-panel" id="tab-diagnosis"      role="tabpanel"></div>
        <div class="tab-panel" id="tab-management"     role="tabpanel"></div>
        <div class="tab-panel" id="tab-overview"       role="tabpanel"></div>
        <div class="tab-panel" id="tab-investigations" role="tabpanel"></div>
        <div class="tab-panel" id="tab-monitoring" role="tabpanel"></div>
        <div class="tab-panel" id="tab-referral"   role="tabpanel"></div>
        <div class="tab-panel" id="tab-air"        role="tabpanel"></div>
        <div class="tab-panel" id="tab-mart"       role="tabpanel"></div>
        <div class="tab-panel" id="tab-inhalers"   role="tabpanel"></div>
        <div class="tab-panel" id="tab-insulins"   role="tabpanel"></div>
        <div class="tab-panel" id="tab-hrt"        role="tabpanel"></div>
        <div class="tab-panel" id="tab-drugs"      role="tabpanel"></div>
        <div class="tab-panel" id="tab-gad2"       role="tabpanel"></div>
        <div class="tab-panel" id="tab-gad7"       role="tabpanel"></div>
        <div class="tab-panel" id="tab-aq10"       role="tabpanel"></div>
        <div class="tab-panel" id="tab-dmard"      role="tabpanel"></div>
        <div class="tab-panel" id="tab-gpcog"      role="tabpanel"></div>
        <div class="tab-panel" id="tab-sixcit"     role="tabpanel"></div>
        <div class="tab-panel" id="tab-types"      role="tabpanel"></div>
        <div class="tab-panel" id="tab-images"     role="tabpanel"></div>
        <div class="tab-panel" id="tab-simonbroome" role="tabpanel"></div>
        <div class="tab-panel" id="tab-steroids"    role="tabpanel"></div>
        <div class="tab-panel" id="tab-ftu"                role="tabpanel"></div>
        <div class="tab-panel" id="tab-schedule"          role="tabpanel"></div>
        <div class="tab-panel" id="tab-special-groups"    role="tabpanel"></div>
        <div class="tab-panel" id="tab-at-risk"           role="tabpanel"></div>
        <div class="tab-panel" id="tab-contraindications" role="tabpanel"></div>
        <div class="tab-panel" id="tab-administration"    role="tabpanel"></div>
      </div>

      <!-- Footer disclaimer -->
      <div class="modal-footer">
        <p>Educational resource only &middot; Not a substitute for clinical judgement &middot; Not independently verified by NICE &middot; Always apply clinical judgement to individual patients</p>
      </div>

    </div>
  </div>

  <!-- Data must load before app.js -->
  <script src="data/guidelines.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
